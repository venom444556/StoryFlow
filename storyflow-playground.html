<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryFlow Design System Playground</title>
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Tokens (mirroring StoryFlow tokens.css) ── */
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-pill: 9999px;
    --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px; --space-8: 32px;
    --text-xs: 12px; --text-sm: 13px; --text-base: 14px; --text-lg: 16px; --text-xl: 20px; --text-2xl: 24px;
    --duration-fast: 150ms; --duration-normal: 250ms;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.3); --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
  }

  /* ── Dark theme ── */
  [data-theme="dark"] {
    --color-bg-base: #0a0a0f; --color-bg-subtle: rgba(255,255,255,0.03); --color-bg-muted: rgba(255,255,255,0.06);
    --color-bg-glass: rgba(255,255,255,0.04); --color-bg-glass-hover: rgba(255,255,255,0.08);
    --color-bg-emphasis: rgba(255,255,255,0.12);
    --color-fg-default: #e8e8ed; --color-fg-muted: #8b8b9e; --color-fg-subtle: #5a5a6e; --color-fg-faint: #3a3a4e;
    --color-fg-on-accent: #ffffff;
    --color-border-default: rgba(255,255,255,0.08); --color-border-emphasis: rgba(255,255,255,0.15);
    --color-success: #22c55e; --color-warning: #eab308; --color-danger: #ef4444; --color-info: #3b82f6;
    --color-surface-primary: rgba(255,255,255,0.03);
    --badge-green-bg: rgba(34,197,94,0.15); --badge-green-fg: #4ade80;
    --badge-blue-bg: rgba(59,130,246,0.15); --badge-blue-fg: #60a5fa;
    --badge-red-bg: rgba(239,68,68,0.15); --badge-red-fg: #f87171;
    --badge-yellow-bg: rgba(234,179,8,0.15); --badge-yellow-fg: #facc15;
    --badge-purple-bg: rgba(168,85,247,0.15); --badge-purple-fg: #c084fc;
    --badge-orange-bg: rgba(249,115,22,0.15); --badge-orange-fg: #fb923c;
    --badge-gray-bg: rgba(255,255,255,0.06); --badge-gray-fg: #8b8b9e;
  }

  /* ── Light theme ── */
  [data-theme="light"] {
    --color-bg-base: #f8f8fa; --color-bg-subtle: rgba(0,0,0,0.02); --color-bg-muted: rgba(0,0,0,0.04);
    --color-bg-glass: rgba(255,255,255,0.7); --color-bg-glass-hover: rgba(255,255,255,0.9);
    --color-bg-emphasis: rgba(0,0,0,0.08);
    --color-fg-default: #1a1a2e; --color-fg-muted: #64648a; --color-fg-subtle: #9090a8; --color-fg-faint: #c0c0d0;
    --color-fg-on-accent: #ffffff;
    --color-border-default: rgba(0,0,0,0.08); --color-border-emphasis: rgba(0,0,0,0.15);
    --color-success: #16a34a; --color-warning: #ca8a04; --color-danger: #dc2626; --color-info: #2563eb;
    --color-surface-primary: rgba(255,255,255,0.8);
    --badge-green-bg: rgba(22,163,74,0.1); --badge-green-fg: #16a34a;
    --badge-blue-bg: rgba(37,99,235,0.1); --badge-blue-fg: #2563eb;
    --badge-red-bg: rgba(220,38,38,0.1); --badge-red-fg: #dc2626;
    --badge-yellow-bg: rgba(202,138,4,0.1); --badge-yellow-fg: #a16207;
    --badge-purple-bg: rgba(147,51,234,0.1); --badge-purple-fg: #9333ea;
    --badge-orange-bg: rgba(234,88,12,0.1); --badge-orange-fg: #ea580c;
    --badge-gray-bg: rgba(0,0,0,0.04); --badge-gray-fg: #64648a;
  }

  body {
    font-family: var(--font-sans); background: var(--color-bg-base); color: var(--color-fg-default);
    display: grid; grid-template-columns: 300px 1fr; grid-template-rows: auto 1fr auto;
    height: 100vh; overflow: hidden;
  }

  /* ── Header ── */
  .pg-header {
    grid-column: 1 / -1; display: flex; align-items: center; gap: 16px;
    padding: 12px 20px; border-bottom: 1px solid var(--color-border-default);
    background: var(--color-bg-glass);
  }
  .pg-header h1 { font-size: var(--text-xl); font-weight: 700; flex: 1; }
  .pg-header h1 span { color: var(--accent-default, #6366f1); }

  /* ── Controls panel ── */
  .pg-controls {
    grid-column: 1; overflow-y: auto; padding: 16px; border-right: 1px solid var(--color-border-default);
    background: var(--color-bg-glass); display: flex; flex-direction: column; gap: 20px;
  }
  .ctrl-section { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-section h3 {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--color-fg-subtle); margin-bottom: 4px;
  }
  .ctrl-row { display: flex; align-items: center; gap: 8px; }
  .ctrl-label { font-size: var(--text-xs); color: var(--color-fg-muted); min-width: 70px; }
  .ctrl-value { font-size: var(--text-xs); color: var(--color-fg-subtle); font-family: var(--font-mono); margin-left: auto; }

  input[type="range"] {
    flex: 1; height: 4px; -webkit-appearance: none; background: var(--color-bg-emphasis);
    border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent-default, #6366f1); cursor: pointer;
  }

  select, .btn {
    font-family: var(--font-sans); font-size: var(--text-xs); padding: 6px 10px;
    border-radius: var(--radius-md); border: 1px solid var(--color-border-default);
    background: var(--color-bg-glass); color: var(--color-fg-default); cursor: pointer;
    transition: all var(--duration-fast);
  }
  select:hover, .btn:hover { background: var(--color-bg-glass-hover); border-color: var(--color-border-emphasis); }
  .btn-accent { background: var(--accent-default, #6366f1); color: white; border-color: transparent; }
  .btn-accent:hover { opacity: 0.9; }

  .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .color-swatch {
    width: 100%; aspect-ratio: 1; border-radius: var(--radius-md); cursor: pointer;
    border: 2px solid transparent; transition: all var(--duration-fast);
  }
  .color-swatch.active { border-color: var(--color-fg-default); transform: scale(1.1); }
  .color-swatch:hover { transform: scale(1.05); }

  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .preset-btn {
    font-size: 11px; padding: 8px; border-radius: var(--radius-md);
    border: 1px solid var(--color-border-default); background: var(--color-bg-glass);
    color: var(--color-fg-muted); cursor: pointer; transition: all var(--duration-fast); text-align: center;
  }
  .preset-btn:hover { background: var(--color-bg-glass-hover); color: var(--color-fg-default); }
  .preset-btn.active { border-color: var(--accent-default, #6366f1); color: var(--accent-default, #6366f1); }

  /* ── Preview area ── */
  .pg-preview {
    grid-column: 2; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px;
  }

  /* ── View tabs ── */
  .view-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .view-tab {
    font-size: 11px; padding: 6px 12px; border-radius: var(--radius-pill);
    border: 1px solid var(--color-border-default); background: var(--color-bg-glass);
    color: var(--color-fg-muted); cursor: pointer; transition: all var(--duration-fast);
  }
  .view-tab:hover { background: var(--color-bg-glass-hover); color: var(--color-fg-default); }
  .view-tab.active { background: var(--accent-default, #6366f1); color: white; border-color: transparent; }

  /* ── Preview cards ── */
  .preview-section { display: flex; flex-direction: column; gap: 16px; }
  .preview-section h2 {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--color-fg-subtle);
  }
  .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

  .glass-card {
    border-radius: var(--radius-lg); border: 1px solid var(--color-border-default);
    background: var(--color-bg-glass); padding: 16px; transition: all var(--duration-normal);
  }
  .glass-card:hover { border-color: var(--color-border-emphasis); }
  .glass-card.obsidian {
    background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(168,85,247,0.04));
    border-color: rgba(99,102,241,0.2);
  }

  .badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
    border-radius: var(--radius-pill); font-size: 11px; font-weight: 600;
  }

  .progress-track {
    height: 6px; border-radius: 3px; background: var(--color-bg-emphasis); overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 3px; transition: width var(--duration-normal); }
  .progress-fill.glow { box-shadow: 0 0 8px currentColor; }

  .avatar {
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%; font-weight: 600; color: var(--color-fg-on-accent);
  }

  /* Board column */
  .board-col { display: flex; flex-direction: column; gap: 8px; min-width: 180px; }
  .board-col-header {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    padding: 8px 12px; border-radius: var(--radius-md); display: flex; align-items: center; gap: 8px;
  }
  .board-card {
    border-radius: var(--radius-md); border: 1px solid var(--color-border-default);
    background: var(--color-bg-glass); padding: 10px 12px; font-size: 12px;
  }
  .board-card-title { font-weight: 600; margin-bottom: 4px; color: var(--color-fg-default); }
  .board-card-meta { font-size: 10px; color: var(--color-fg-muted); display: flex; gap: 8px; align-items: center; }

  /* Workflow node */
  .wf-node {
    border-radius: var(--radius-lg); border: 2px solid var(--color-border-default);
    background: var(--color-bg-glass); padding: 12px; width: 160px;
  }
  .wf-node-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .wf-node-icon {
    width: 24px; height: 24px; border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center; font-size: 11px;
  }
  .wf-node-title { font-size: 13px; font-weight: 600; }
  .wf-node-type { font-size: 10px; padding: 1px 6px; border-radius: var(--radius-pill); }
  .wf-node.running { border-color: var(--color-warning); box-shadow: 0 0 16px rgba(234,179,8,0.2); }
  .wf-node.success { border-color: var(--color-success); box-shadow: 0 0 16px rgba(34,197,94,0.2); }
  .wf-node.error { border-color: var(--color-danger); box-shadow: 0 0 16px rgba(239,68,68,0.2); }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center; gap: 8px; padding: 6px 16px;
    border-top: 1px solid var(--color-border-default); background: var(--color-bg-glass);
    font-size: 11px; color: var(--color-fg-muted);
  }

  /* Typography scale */
  .type-scale { display: flex; flex-direction: column; gap: 8px; }
  .type-row { display: flex; align-items: baseline; gap: 12px; }
  .type-label { font-size: 10px; color: var(--color-fg-subtle); min-width: 50px; font-family: var(--font-mono); }

  /* Prompt output */
  .pg-prompt {
    grid-column: 1 / -1; border-top: 1px solid var(--color-border-default);
    background: var(--color-bg-glass); padding: 12px 20px; display: flex; align-items: flex-start; gap: 12px;
  }
  .pg-prompt pre {
    flex: 1; font-family: var(--font-mono); font-size: 12px; color: var(--color-fg-muted);
    white-space: pre-wrap; word-break: break-word; line-height: 1.5; max-height: 80px; overflow-y: auto;
  }
  .copy-btn {
    padding: 6px 14px; border-radius: var(--radius-md); font-size: 11px; font-weight: 600;
    background: var(--accent-default, #6366f1); color: white; border: none; cursor: pointer;
    white-space: nowrap; transition: all var(--duration-fast);
  }
  .copy-btn:hover { opacity: 0.9; }

  /* Theme toggle */
  .theme-toggle {
    display: flex; border-radius: var(--radius-pill); border: 1px solid var(--color-border-default);
    overflow: hidden;
  }
  .theme-toggle button {
    padding: 4px 12px; font-size: 11px; border: none; cursor: pointer;
    background: transparent; color: var(--color-fg-muted); transition: all var(--duration-fast);
  }
  .theme-toggle button.active { background: var(--accent-default, #6366f1); color: white; }
</style>
</head>
<body data-theme="dark">
<script>
// ── Safe DOM helper ──
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'text') { e.textContent = v; }
      else if (k === 'style' && typeof v === 'object') { Object.assign(e.style, v); }
      else if (k === 'class') { e.className = v; }
      else if (k.startsWith('on')) { e.addEventListener(k.slice(2).toLowerCase(), v); }
      else { e.setAttribute(k, v); }
    }
  }
  if (children) {
    const arr = Array.isArray(children) ? children : [children];
    for (const child of arr) {
      if (child == null) continue;
      if (typeof child === 'string') e.appendChild(document.createTextNode(child));
      else e.appendChild(child);
    }
  }
  return e;
}

// ── Accent colors ──
const ACCENT_COLORS = [
  { name: 'Indigo', value: '#6366f1' },
  { name: 'Blue', value: '#3b82f6' },
  { name: 'Cyan', value: '#06b6d4' },
  { name: 'Emerald', value: '#10b981' },
  { name: 'Amber', value: '#f59e0b' },
  { name: 'Orange', value: '#f97316' },
  { name: 'Rose', value: '#f43f5e' },
  { name: 'Pink', value: '#ec4899' },
  { name: 'Purple', value: '#a855f7' },
  { name: 'Slate', value: '#64748b' },
];

const VIEWS = ['Components', 'Board', 'Overview', 'Workflow', 'Wiki', 'Architecture', 'Decisions', 'Timeline'];

const PRESETS = {
  Default: { theme: 'dark', accent: '#6366f1', cardRadius: 12, cardPadding: 16, badgeSize: 'md', progressGlow: false, cardVariant: 'glass' },
  Minimal: { theme: 'light', accent: '#64748b', cardRadius: 8, cardPadding: 12, badgeSize: 'sm', progressGlow: false, cardVariant: 'glass' },
  Bold: { theme: 'dark', accent: '#f43f5e', cardRadius: 16, cardPadding: 20, badgeSize: 'lg', progressGlow: true, cardVariant: 'obsidian' },
  Warm: { theme: 'light', accent: '#f59e0b', cardRadius: 12, cardPadding: 16, badgeSize: 'md', progressGlow: false, cardVariant: 'glass' },
  Cyber: { theme: 'dark', accent: '#06b6d4', cardRadius: 6, cardPadding: 14, badgeSize: 'md', progressGlow: true, cardVariant: 'obsidian' },
};

const DEFAULTS = { ...PRESETS.Default };

// ── State ──
const state = {
  theme: 'dark',
  accent: '#6366f1',
  activeView: 'Components',
  cardRadius: 12,
  cardPadding: 16,
  badgeSize: 'md',
  progressGlow: false,
  progressFill: 65,
  cardVariant: 'glass',
  activePreset: 'Default',
};

function applyAccent(color) {
  document.documentElement.style.setProperty('--accent-default', color);
}

// ── Build header ──
const header = el('div', { class: 'pg-header' }, [
  el('h1', {}, [document.createTextNode('Story'), el('span', { text: 'Flow' }), document.createTextNode(' Playground')]),
  (() => {
    const toggle = el('div', { class: 'theme-toggle' });
    ['dark', 'light'].forEach(t => {
      const btn = el('button', { text: t === 'dark' ? 'Dark' : 'Light', class: state.theme === t ? 'active' : '', onClick: () => {
        state.theme = t;
        document.body.setAttribute('data-theme', t);
        updateAll();
      }});
      toggle.appendChild(btn);
    });
    return toggle;
  })(),
]);
document.body.appendChild(header);

// ── Build controls ──
const controls = el('div', { class: 'pg-controls' });

// Preset section
const presetSection = el('div', { class: 'ctrl-section' }, [el('h3', { text: 'Presets' })]);
const presetGrid = el('div', { class: 'preset-grid' });
for (const [name, preset] of Object.entries(PRESETS)) {
  const btn = el('button', { class: 'preset-btn' + (state.activePreset === name ? ' active' : ''), text: name, onClick: () => {
    Object.assign(state, preset);
    state.activePreset = name;
    document.body.setAttribute('data-theme', state.theme);
    applyAccent(state.accent);
    updateAll();
  }});
  presetGrid.appendChild(btn);
}
presetSection.appendChild(presetGrid);
controls.appendChild(presetSection);

// Accent color section
const accentSection = el('div', { class: 'ctrl-section' }, [el('h3', { text: 'Accent Color' })]);
const colorGrid = el('div', { class: 'color-grid' });
ACCENT_COLORS.forEach(c => {
  const swatch = el('div', {
    class: 'color-swatch' + (state.accent === c.value ? ' active' : ''),
    title: c.name,
    style: { background: c.value },
    onClick: () => { state.accent = c.value; state.activePreset = ''; applyAccent(c.value); updateAll(); }
  });
  colorGrid.appendChild(swatch);
});
accentSection.appendChild(colorGrid);
controls.appendChild(accentSection);

// Card controls
const cardSection = el('div', { class: 'ctrl-section' }, [el('h3', { text: 'Card Style' })]);

// Variant select
const variantRow = el('div', { class: 'ctrl-row' }, [el('span', { class: 'ctrl-label', text: 'Variant' })]);
const variantSelect = el('select', { onChange: (e) => { state.cardVariant = e.target.value; state.activePreset = ''; updateAll(); }});
['glass', 'obsidian'].forEach(v => {
  const opt = el('option', { value: v, text: v });
  if (state.cardVariant === v) opt.selected = true;
  variantSelect.appendChild(opt);
});
variantRow.appendChild(variantSelect);
cardSection.appendChild(variantRow);

// Radius slider
const radiusRow = el('div', { class: 'ctrl-row' }, [el('span', { class: 'ctrl-label', text: 'Radius' })]);
const radiusInput = el('input', { type: 'range', min: '2', max: '24', value: String(state.cardRadius), onInput: (e) => {
  state.cardRadius = parseInt(e.target.value); state.activePreset = ''; updateAll();
}});
const radiusValue = el('span', { class: 'ctrl-value', text: state.cardRadius + 'px' });
radiusRow.appendChild(radiusInput);
radiusRow.appendChild(radiusValue);
cardSection.appendChild(radiusRow);

// Padding slider
const padRow = el('div', { class: 'ctrl-row' }, [el('span', { class: 'ctrl-label', text: 'Padding' })]);
const padInput = el('input', { type: 'range', min: '8', max: '28', value: String(state.cardPadding), onInput: (e) => {
  state.cardPadding = parseInt(e.target.value); state.activePreset = ''; updateAll();
}});
const padValue = el('span', { class: 'ctrl-value', text: state.cardPadding + 'px' });
padRow.appendChild(padInput);
padRow.appendChild(padValue);
cardSection.appendChild(padRow);
controls.appendChild(cardSection);

// Badge controls
const badgeSection = el('div', { class: 'ctrl-section' }, [el('h3', { text: 'Badges' })]);
const badgeSizeRow = el('div', { class: 'ctrl-row' }, [el('span', { class: 'ctrl-label', text: 'Size' })]);
const badgeSizeSelect = el('select', { onChange: (e) => { state.badgeSize = e.target.value; state.activePreset = ''; updateAll(); }});
['sm', 'md', 'lg'].forEach(s => {
  const opt = el('option', { value: s, text: s });
  if (state.badgeSize === s) opt.selected = true;
  badgeSizeSelect.appendChild(opt);
});
badgeSizeRow.appendChild(badgeSizeSelect);
badgeSection.appendChild(badgeSizeRow);
controls.appendChild(badgeSection);

// Progress controls
const progressSection = el('div', { class: 'ctrl-section' }, [el('h3', { text: 'Progress Bar' })]);
const fillRow = el('div', { class: 'ctrl-row' }, [el('span', { class: 'ctrl-label', text: 'Fill' })]);
const fillInput = el('input', { type: 'range', min: '0', max: '100', value: String(state.progressFill), onInput: (e) => {
  state.progressFill = parseInt(e.target.value); updateAll();
}});
const fillValue = el('span', { class: 'ctrl-value', text: state.progressFill + '%' });
fillRow.appendChild(fillInput);
fillRow.appendChild(fillValue);
progressSection.appendChild(fillRow);

const glowRow = el('div', { class: 'ctrl-row' }, [el('span', { class: 'ctrl-label', text: 'Glow' })]);
const glowCheck = el('input', { type: 'checkbox', onChange: (e) => { state.progressGlow = e.target.checked; state.activePreset = ''; updateAll(); }});
if (state.progressGlow) glowCheck.checked = true;
glowRow.appendChild(glowCheck);
progressSection.appendChild(glowRow);
controls.appendChild(progressSection);

document.body.appendChild(controls);

// ── Preview area ──
const preview = el('div', { class: 'pg-preview' });

// View tabs
const viewTabs = el('div', { class: 'view-tabs' });
VIEWS.forEach(v => {
  const tab = el('button', { class: 'view-tab' + (state.activeView === v ? ' active' : ''), text: v, onClick: () => {
    state.activeView = v; updateAll();
  }});
  viewTabs.appendChild(tab);
});
preview.appendChild(viewTabs);

const previewContent = el('div', { class: 'preview-section' });
preview.appendChild(previewContent);
document.body.appendChild(preview);

// ── Prompt output ──
const promptArea = el('div', { class: 'pg-prompt' });
const promptPre = el('pre', { text: '' });
const copyBtn = el('button', { class: 'copy-btn', text: 'Copy', onClick: () => {
  navigator.clipboard.writeText(promptPre.textContent).then(() => {
    copyBtn.textContent = 'Copied!';
    setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
  });
}});
promptArea.appendChild(promptPre);
promptArea.appendChild(copyBtn);
document.body.appendChild(promptArea);

// ── Render functions ──

function renderComponents() {
  const section = el('div', { class: 'preview-section' });

  // GlassCard variants

function renderWorkflow() {
  const section = el('div', { class: 'preview-section' });
  section.appendChild(el('h2', { text: 'Workflow Canvas' }));

  const canvasContainer = el('div', { style: {
    position: 'relative', height: '300px', borderRadius: 'var(--radius-lg)', border: '1px solid var(--color-border-default)',
    background: 'var(--color-bg-base)',
    backgroundImage: 'radial-gradient(circle, var(--color-fg-faint) 1px, transparent 1px)',
    backgroundSize: '20px 20px', overflow: 'hidden'
  }});

  // Workflow nodes
  const nodes = [
    { title: 'Start', type: 'Start', color: '#22c55e', x: 30, y: 120, status: 'success' },
    { title: 'Fetch Data', type: 'Action', color: '#6366f1', x: 220, y: 60, status: 'success' },
    { title: 'Validate', type: 'Decision', color: '#f59e0b', x: 220, y: 180, status: 'running' },
    { title: 'Transform', type: 'Action', color: '#6366f1', x: 420, y: 60, status: '' },
    { title: 'Error Handler', type: 'Action', color: '#ef4444', x: 420, y: 180, status: 'error' },
    { title: 'End', type: 'End', color: '#ef4444', x: 610, y: 120, status: '' },
  ];

  // Draw connections as SVG
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';
  svg.style.pointerEvents = 'none';

  const connections = [
    [0, 1], [0, 2], [1, 3], [2, 4], [3, 5], [2, 3]
  ];
  connections.forEach(([from, to]) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', String(nodes[from].x + 80));
    line.setAttribute('y1', String(nodes[from].y + 25));
    line.setAttribute('x2', String(nodes[to].x));
    line.setAttribute('y2', String(nodes[to].y + 25));
    line.setAttribute('stroke', 'var(--color-border-emphasis)');
    line.setAttribute('stroke-width', '2');
    svg.appendChild(line);
  });
  canvasContainer.appendChild(svg);

  nodes.forEach(n => {
    const node = el('div', {
      class: 'wf-node' + (n.status ? ' ' + n.status : ''),
      style: { position: 'absolute', left: n.x + 'px', top: n.y + 'px' }
    });
    const header = el('div', { class: 'wf-node-header' });
    header.appendChild(el('div', { class: 'wf-node-icon', style: { background: n.color + '22', color: n.color }, text: n.type[0] }));
    header.appendChild(el('span', { class: 'wf-node-title', text: n.title }));
    node.appendChild(header);
    node.appendChild(el('span', { class: 'wf-node-type', text: n.type, style: { background: n.color + '22', color: n.color } }));
    canvasContainer.appendChild(node);
  });

  section.appendChild(canvasContainer);

  // Status bar
  const statusBar = el('div', { class: 'status-bar', style: { borderRadius: '0 0 var(--radius-md) var(--radius-md)', border: '1px solid var(--color-border-default)', borderTop: 'none' } });
  const greenDot = el('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: 'var(--color-success)', display: 'inline-block' } });
  statusBar.appendChild(greenDot);
  statusBar.appendChild(el('span', { text: '6 nodes' }));
  statusBar.appendChild(el('span', { text: '|', style: { color: 'var(--color-fg-faint)' } }));
  statusBar.appendChild(el('span', { text: '6 connections' }));
  statusBar.appendChild(el('span', { text: '|', style: { color: 'var(--color-fg-faint)' } }));
  statusBar.appendChild(el('span', { text: 'Executing...', style: { color: 'var(--color-warning)' } }));
  section.appendChild(statusBar);

  return section;
}

function renderTimeline() {
  const section = el('div', { class: 'preview-section' });
  section.appendChild(el('h2', { text: 'Timeline' }));

  const container = el('div', { style: { position: 'relative', paddingLeft: '40px' } });

  // Vertical line
  const line = el('div', { style: {
    position: 'absolute', left: '18px', top: '0', bottom: '0', width: '3px',
    background: 'linear-gradient(to bottom, var(--color-success), var(--accent-default, #6366f1), var(--color-fg-faint))',
    borderRadius: '2px',
  }});
  container.appendChild(line);

  // Phase cards
  const phases = [
    { name: 'Foundation', status: 'completed', progress: 100, deliverables: ['Tokens', 'UI Kit', 'Auth'], days: '14 days' },
    { name: 'Core Features', status: 'in-progress', progress: 65, deliverables: ['Board', 'Workflow', 'Wiki'], days: '21 days' },
    { name: 'AI Integration', status: 'upcoming', progress: 0, deliverables: ['Agent', 'CLI', 'Steering'], days: '28 days' },
    { name: 'Polish & Launch', status: 'upcoming', progress: 0, deliverables: ['Testing', 'Docs', 'Deploy'], days: '14 days' },
  ];

  const dotColors = { completed: 'var(--color-success)', 'in-progress': 'var(--accent-default, #6366f1)', upcoming: 'var(--color-fg-faint)' };
  const borderColors2 = { completed: 'var(--color-success)', 'in-progress': 'var(--accent-default, #6366f1)', upcoming: 'var(--color-fg-faint)' };

  phases.forEach((phase, i) => {
    const row = el('div', { style: { position: 'relative', marginBottom: '16px' } });

    // Dot
    const dot = el('div', { style: {
      position: 'absolute', left: '-30px', top: '12px', width: '10px', height: '10px',
      borderRadius: '50%', background: dotColors[phase.status],
      border: '2px solid var(--color-bg-base)',
      boxShadow: phase.status !== 'upcoming' ? '0 0 8px ' + dotColors[phase.status] : 'none',
    }});
    row.appendChild(dot);

    // Card
    const card = el('div', {
      class: 'glass-card',
      style: {
        borderRadius: state.cardRadius + 'px', padding: state.cardPadding + 'px',
        borderLeft: '3px solid ' + borderColors2[phase.status],
        opacity: phase.status === 'upcoming' ? '0.6' : '1',
      }
    });
    const top = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' } });
    top.appendChild(el('span', { text: phase.name, style: { fontSize: '14px', fontWeight: '600' } }));
    top.appendChild(el('span', { text: phase.days, style: { fontSize: '10px', color: 'var(--color-fg-subtle)' } }));
    card.appendChild(top);

    if (phase.progress > 0) {
      const track = el('div', { class: 'progress-track', style: { marginBottom: '8px' } });
      track.appendChild(el('div', {
        class: 'progress-fill' + (state.progressGlow ? ' glow' : ''),
        style: { width: phase.progress + '%', background: borderColors2[phase.status], color: borderColors2[phase.status] }
      }));
      card.appendChild(track);
    }

    const tags = el('div', { style: { display: 'flex', gap: '4px', flexWrap: 'wrap' } });
    phase.deliverables.forEach(d => {
      tags.appendChild(el('span', { text: d, style: { fontSize: '10px', padding: '2px 8px', borderRadius: 'var(--radius-pill)', background: 'var(--color-bg-muted)', color: 'var(--color-fg-muted)' } }));
    });
    card.appendChild(tags);
    row.appendChild(card);
    container.appendChild(row);
  });

  section.appendChild(container);

  // Stats footer
  const stats = el('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px', marginTop: '16px' } });
  [{ label: 'Days Elapsed', value: '35' }, { label: 'Milestones Hit', value: '4/12' }, { label: 'Active Agents', value: '1' }].forEach(s => {
    const card = el('div', { class: 'glass-card', style: { borderRadius: state.cardRadius + 'px', padding: '10px', textAlign: 'center' } });
    card.appendChild(el('div', { text: s.value, style: { fontSize: '20px', fontWeight: '700', color: 'var(--accent-default, #6366f1)' } }));
    card.appendChild(el('div', { text: s.label, style: { fontSize: '10px', color: 'var(--color-fg-subtle)', marginTop: '2px' } }));
    stats.appendChild(card);
  });
  section.appendChild(stats);

  return section;
}

// ── View router ──
const VIEW_RENDERERS = {
  Components: renderComponents,
  Board: renderBoard,
  Overview: renderOverview,
  Workflow: renderWorkflow,
  Wiki: renderWiki,
  Architecture: renderArchitecture,
  Decisions: renderDecisions,
  Timeline: renderTimeline,
};

// ── Update all ──
function updateAll() {
  // Update theme toggle
  header.querySelectorAll('.theme-toggle button').forEach(btn => {
    btn.className = btn.textContent.toLowerCase() === state.theme ? 'active' : '';
  });

  // Update color swatches
  controls.querySelectorAll('.color-swatch').forEach((swatch, i) => {
    swatch.className = 'color-swatch' + (ACCENT_COLORS[i].value === state.accent ? ' active' : '');
  });

  // Update preset buttons
  controls.querySelectorAll('.preset-btn').forEach(btn => {
    btn.className = 'preset-btn' + (btn.textContent === state.activePreset ? ' active' : '');
  });

  // Update slider values
  radiusValue.textContent = state.cardRadius + 'px';
  radiusInput.value = state.cardRadius;
  padValue.textContent = state.cardPadding + 'px';
  padInput.value = state.cardPadding;
  fillValue.textContent = state.progressFill + '%';
  fillInput.value = state.progressFill;
  glowCheck.checked = state.progressGlow;
  variantSelect.value = state.cardVariant;
  badgeSizeSelect.value = state.badgeSize;

  // Update view tabs
  preview.querySelectorAll('.view-tab').forEach(tab => {
    tab.className = 'view-tab' + (tab.textContent === state.activeView ? ' active' : '');
  });

  // Render active view
  previewContent.replaceChildren();
  const renderer = VIEW_RENDERERS[state.activeView];
  if (renderer) previewContent.appendChild(renderer());

  // Update prompt
  updatePrompt();
}

function updatePrompt() {
  const parts = [];
  if (state.theme !== DEFAULTS.theme) parts.push('using ' + state.theme + ' theme');
  if (state.accent !== DEFAULTS.accent) {
    const name = ACCENT_COLORS.find(c => c.value === state.accent)?.name || state.accent;
    parts.push(name + ' as the accent color');
  }
  if (state.cardRadius !== DEFAULTS.cardRadius) parts.push('card border-radius of ' + state.cardRadius + 'px');
  if (state.cardPadding !== DEFAULTS.cardPadding) parts.push('card padding of ' + state.cardPadding + 'px');
  if (state.cardVariant !== DEFAULTS.cardVariant) parts.push('the ' + state.cardVariant + ' card variant');
  if (state.badgeSize !== DEFAULTS.badgeSize) parts.push(state.badgeSize + ' badge size');
  if (state.progressGlow !== DEFAULTS.progressGlow) parts.push(state.progressGlow ? 'glowing progress bars' : 'no progress bar glow');

  if (parts.length === 0) {
    promptPre.textContent = 'Update the StoryFlow design system with the default configuration. All values match the current tokens.css defaults.';
  } else {
    promptPre.textContent = 'Update the StoryFlow design system to use ' + parts.join(', ') + '. Apply these changes to the tokens.css file and ensure all components reflect the updated values in both dark and light themes.';
  }
}

// ── Initialize ──
applyAccent(state.accent);
updateAll();
</script>
