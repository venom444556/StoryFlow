<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-size: 11px; font-weight: 500; fill: #6b7280; letter-spacing: 0.05em; }
      .node-label { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
      .node-sub { font-size: 10px; font-weight: 400; fill: #6b7280; }
      .conn-label { font-size: 9px; font-weight: 600; fill: #9ca3af; letter-spacing: 0.08em; }
      .port-label { font-size: 9px; font-weight: 500; fill: #9ca3af; }
    </style>
    <!-- Shadows -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.05"/>
    </filter>
    <!-- Arrowhead -->
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#d1d5db" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" rx="16" fill="#fafaf9"/>
  <rect x="0.5" y="0.5" width="959" height="619" rx="16" fill="none" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" class="title">System Architecture</text>

  <!-- ================================================================== -->
  <!-- BROWSER (left) -->
  <!-- ================================================================== -->
  <g filter="url(#shadow)">
    <rect x="40" y="180" width="220" height="260" rx="14" fill="#fff"/>
    <rect x="40" y="180" width="220" height="260" rx="14" fill="none" stroke="#e5e7eb"/>
  </g>
  <!-- Browser chrome -->
  <rect x="40" y="180" width="220" height="36" rx="14" fill="#f9fafb"/>
  <rect x="40" y="202" width="220" height="14" fill="#f9fafb"/>
  <line x1="40" y1="216" x2="260" y2="216" stroke="#e5e7eb"/>
  <circle cx="60" cy="198" r="4" fill="#fca5a5"/>
  <circle cx="74" cy="198" r="4" fill="#fcd34d"/>
  <circle cx="88" cy="198" r="4" fill="#86efac"/>
  <text x="150" y="202" text-anchor="middle" class="node-label">Browser</text>

  <!-- Browser contents -->
  <text x="150" y="244" text-anchor="middle" class="node-sub">React 18 + Vite 6</text>
  <text x="150" y="260" text-anchor="middle" class="node-sub">Zustand State</text>

  <!-- IndexedDB box -->
  <rect x="62" y="280" width="176" height="44" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="150" y="300" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#92400e;">IndexedDB</text>
  <text x="150" y="314" text-anchor="middle" class="node-sub">Client cache</text>

  <!-- UI Components -->
  <rect x="62" y="338" width="176" height="44" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="150" y="358" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#374151;">80+ Components</text>
  <text x="150" y="372" text-anchor="middle" class="node-sub">Glassmorphic UI + tokens.css</text>

  <!-- Port label -->
  <text x="150" y="456" text-anchor="middle" class="port-label">:3000 (dev) / :3001 (prod)</text>

  <!-- ================================================================== -->
  <!-- EXPRESS SERVER (center) -->
  <!-- ================================================================== -->
  <g filter="url(#shadow)">
    <rect x="370" y="140" width="220" height="340" rx="14" fill="#fff"/>
    <rect x="370" y="140" width="220" height="340" rx="14" fill="none" stroke="#e5e7eb"/>
  </g>
  <!-- Server header -->
  <rect x="370" y="140" width="220" height="40" rx="14" fill="#1e293b"/>
  <rect x="370" y="166" width="220" height="14" fill="#1e293b"/>
  <text x="480" y="166" text-anchor="middle" style="font-size:13px;font-weight:600;fill:#f8fafc;">Express Server</text>

  <!-- REST API -->
  <rect x="392" y="198" width="176" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="480" y="218" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#1e40af;">REST API</text>
  <text x="480" y="232" text-anchor="middle" class="node-sub">CRUD + validation + auth</text>

  <!-- Event System -->
  <rect x="392" y="258" width="176" height="48" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="480" y="278" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#7e22ce;">Event Stream</text>
  <text x="480" y="292" text-anchor="middle" class="node-sub">Provenance + gates + steering</text>

  <!-- WebSocket -->
  <rect x="392" y="318" width="176" height="48" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="480" y="338" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#065f46;">WebSocket</text>
  <text x="480" y="352" text-anchor="middle" class="node-sub">Real-time sync + broadcast</text>

  <!-- Write Lock -->
  <rect x="392" y="378" width="176" height="48" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="398" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#9a3412;">Project Lock</text>
  <text x="480" y="412" text-anchor="middle" class="node-sub">Per-project write serialization</text>

  <!-- Port label -->
  <text x="480" y="500" text-anchor="middle" class="port-label">:3001</text>

  <!-- ================================================================== -->
  <!-- SQLITE (bottom center) -->
  <!-- ================================================================== -->
  <g filter="url(#shadow-sm)">
    <rect x="410" y="520" width="140" height="64" rx="12" fill="#fff"/>
    <rect x="410" y="520" width="140" height="64" rx="12" fill="none" stroke="#e5e7eb"/>
  </g>
  <!-- DB icon -->
  <ellipse cx="480" cy="540" rx="20" ry="8" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <rect x="460" y="540" width="40" height="16" fill="#fff"/>
  <line x1="460" y1="540" x2="460" y2="556" stroke="#f59e0b" stroke-width="1"/>
  <line x1="500" y1="540" x2="500" y2="556" stroke="#f59e0b" stroke-width="1"/>
  <ellipse cx="480" cy="556" rx="20" ry="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="578" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#92400e;">SQLite</text>

  <!-- ================================================================== -->
  <!-- CLAUDE CODE / MCP (right) -->
  <!-- ================================================================== -->
  <g filter="url(#shadow)">
    <rect x="700" y="180" width="220" height="260" rx="14" fill="#fff"/>
    <rect x="700" y="180" width="220" height="260" rx="14" fill="none" stroke="#e5e7eb"/>
  </g>
  <!-- MCP header -->
  <rect x="700" y="180" width="220" height="40" rx="14" fill="#f59e0b"/>
  <rect x="700" y="206" width="220" height="14" fill="#f59e0b"/>
  <text x="810" y="206" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#fff;">Claude Code</text>

  <!-- MCP Server -->
  <rect x="722" y="238" width="176" height="48" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="810" y="258" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#92400e;">MCP Server (stdio)</text>
  <text x="810" y="272" text-anchor="middle" class="node-sub">46 tools + Zod schemas</text>

  <!-- Agent Prompt -->
  <rect x="722" y="298" width="176" height="48" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="810" y="318" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#374151;">Agent Prompt</text>
  <text x="810" y="332" text-anchor="middle" class="node-sub">Self-documenting via wiki</text>

  <!-- Hooks -->
  <rect x="722" y="358" width="176" height="48" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="810" y="378" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#374151;">Hooks</text>
  <text x="810" y="392" text-anchor="middle" class="node-sub">Pre/post commit triggers</text>

  <!-- ================================================================== -->
  <!-- CONNECTIONS -->
  <!-- ================================================================== -->

  <!-- Browser → Server (REST) -->
  <line x1="260" y1="222" x2="370" y2="222" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-blue)"/>
  <text x="315" y="214" text-anchor="middle" class="conn-label" fill="#3b82f6">REST /api</text>

  <!-- Server → Browser (WebSocket) -->
  <line x1="370" y1="342" x2="260" y2="342" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="315" y="334" text-anchor="middle" class="conn-label" fill="#10b981">WEBSOCKET</text>

  <!-- MCP → Server (HTTP) -->
  <line x1="700" y1="262" x2="590" y2="222" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>
  <text x="652" y="230" text-anchor="middle" class="conn-label" fill="#f59e0b">HTTP</text>

  <!-- Server → SQLite -->
  <line x1="480" y1="480" x2="480" y2="520" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="506" text-anchor="start" class="conn-label">READ/WRITE</text>

  <!-- Legend -->
  <g transform="translate(40, 540)">
    <text x="0" y="0" class="subtitle">CONNECTIONS</text>
    <line x1="0" y1="16" x2="24" y2="16" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="30" y="20" class="node-sub">REST API</text>
    <line x1="100" y1="16" x2="124" y2="16" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="130" y="20" class="node-sub">WebSocket</text>
    <line x1="210" y1="16" x2="234" y2="16" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="240" y="20" class="node-sub">MCP (via HTTP)</text>
  </g>

  <!-- Data flow annotation -->
  <g transform="translate(40, 76)">
    <rect x="0" y="0" width="880" height="48" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
    <text x="440" y="20" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#92400e;">How it works</text>
    <text x="440" y="36" text-anchor="middle" class="node-sub">The AI agent reads and writes through the same data store the human sees. Wiki pages are the agent's memory. Events are the audit trail. Gates are the guardrails.</text>
  </g>
</svg>
