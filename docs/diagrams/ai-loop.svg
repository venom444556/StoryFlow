<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #1a1a1a; }
      .node-label { font-size: 12px; font-weight: 600; }
      .node-sub { font-size: 9.5px; font-weight: 400; fill: #6b7280; }
      .step-num { font-size: 10px; font-weight: 700; fill: #fff; }
      .conn-label { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8b5cf6" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" rx="16" fill="#fafaf9"/>
  <rect x="0.5" y="0.5" width="959" height="479" rx="16" fill="none" stroke="#e5e7eb"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" class="title">AI Transparency Loop</text>

  <!-- ================================================================== -->
  <!-- HUMAN (left) -->
  <!-- ================================================================== -->
  <g filter="url(#shadow)">
    <rect x="50" y="140" width="180" height="200" rx="14" fill="#fff" stroke="#e5e7eb"/>
  </g>
  <rect x="50" y="140" width="180" height="40" rx="14" fill="#8b5cf6"/>
  <rect x="50" y="166" width="180" height="14" fill="#8b5cf6"/>
  <!-- Person icon -->
  <circle cx="110" cy="160" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
  <path d="M96,174 Q110,182 124,174" fill="none" stroke="#fff" stroke-width="1.5"/>
  <text x="152" y="165" style="font-size:13px;font-weight:700;fill:#fff;">Human</text>

  <text x="140" y="206" text-anchor="middle" class="node-sub">Reviews events</text>
  <text x="140" y="222" text-anchor="middle" class="node-sub">Approves / rejects gates</text>
  <text x="140" y="238" text-anchor="middle" class="node-sub">Sends steering directives</text>
  <text x="140" y="254" text-anchor="middle" class="node-sub">Reads agent wiki pages</text>
  <text x="140" y="270" text-anchor="middle" class="node-sub">Edits board directly</text>

  <!-- Purple badge -->
  <rect x="82" y="296" width="116" height="24" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
  <circle cx="96" cy="308" r="4" fill="#8b5cf6"/>
  <text x="152" y="312" text-anchor="end" style="font-size:9px;font-weight:600;fill:#6d28d9;">PROVENANCE: HUMAN</text>

  <!-- ================================================================== -->
  <!-- STORYFLOW (center) -->
  <!-- ================================================================== -->
  <g filter="url(#shadow)">
    <rect x="340" y="100" width="280" height="280" rx="14" fill="#fff" stroke="#e5e7eb"/>
  </g>
  <rect x="340" y="100" width="280" height="44" rx="14" fill="#1e293b"/>
  <text x="480" y="128" text-anchor="middle" style="font-size:14px;font-weight:700;fill:#f8fafc;">StoryFlow</text>

  <!-- Inner boxes -->
  <rect x="362" y="160" width="120" height="42" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="422" y="178" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#1e40af;">Board</text>
  <text x="422" y="192" text-anchor="middle" class="node-sub">Issues + Sprints</text>

  <rect x="498" y="160" width="108" height="42" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="552" y="178" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#065f46;">Wiki</text>
  <text x="552" y="192" text-anchor="middle" class="node-sub">Agent memory</text>

  <rect x="362" y="214" width="120" height="42" rx="8" fill="#fdf4ff" stroke="#e9d5ff"/>
  <text x="422" y="232" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#7e22ce;">Event Stream</text>
  <text x="422" y="246" text-anchor="middle" class="node-sub">Full audit trail</text>

  <rect x="498" y="214" width="108" height="42" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="552" y="232" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#9a3412;">Gates</text>
  <text x="552" y="246" text-anchor="middle" class="node-sub">Approval required</text>

  <rect x="362" y="268" width="120" height="42" rx="8" fill="#fefce8" stroke="#fde68a"/>
  <text x="422" y="286" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#854d0e;">Steering</text>
  <text x="422" y="300" text-anchor="middle" class="node-sub">Human directives</text>

  <rect x="498" y="268" width="108" height="42" rx="8" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="552" y="286" text-anchor="middle" style="font-size:10px;font-weight:600;fill:#374151;">Sessions</text>
  <text x="552" y="300" text-anchor="middle" class="node-sub">Memory chain</text>

  <!-- Shared data badge -->
  <rect x="402" y="326" width="156" height="24" rx="12" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="480" y="342" text-anchor="middle" style="font-size:9px;font-weight:600;fill:#92400e;">SINGLE SOURCE OF TRUTH</text>

  <!-- ================================================================== -->
  <!-- AI AGENT (right) -->
  <!-- ================================================================== -->
  <g filter="url(#shadow)">
    <rect x="730" y="140" width="180" height="200" rx="14" fill="#fff" stroke="#e5e7eb"/>
  </g>
  <rect x="730" y="140" width="180" height="40" rx="14" fill="#f59e0b"/>
  <rect x="730" y="166" width="180" height="14" fill="#f59e0b"/>
  <!-- Robot icon -->
  <rect x="770" y="150" width="16" height="14" rx="3" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="775" cy="156" r="2" fill="#fff"/>
  <circle cx="783" cy="156" r="2" fill="#fff"/>
  <line x1="778" y1="147" x2="778" y2="150" stroke="#fff" stroke-width="1.5"/>
  <text x="798" y="163" style="font-size:13px;font-weight:700;fill:#fff;">AI Agent</text>

  <text x="820" y="206" text-anchor="middle" class="node-sub">Reads board + wiki</text>
  <text x="820" y="222" text-anchor="middle" class="node-sub">Creates/updates issues</text>
  <text x="820" y="238" text-anchor="middle" class="node-sub">Writes wiki pages</text>
  <text x="820" y="254" text-anchor="middle" class="node-sub">Records events + reasoning</text>
  <text x="820" y="270" text-anchor="middle" class="node-sub">Requests gate approval</text>

  <!-- Cyan badge -->
  <rect x="752" y="296" width="116" height="24" rx="12" fill="#ecfeff" stroke="#a5f3fc"/>
  <circle cx="766" cy="308" r="4" fill="#06b6d4"/>
  <text x="882" y="312" text-anchor="end" style="font-size:9px;font-weight:600;fill:#0e7490;">PROVENANCE: AI (0.85)</text>

  <!-- ================================================================== -->
  <!-- FLOW ARROWS -->
  <!-- ================================================================== -->

  <!-- Step 1: Agent → StoryFlow (writes) -->
  <path d="M730,200 L624,200" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arr-amber)"/>
  <circle cx="677" cy="186" r="10" fill="#f59e0b"/>
  <text x="677" y="190" text-anchor="middle" class="step-num">1</text>
  <text x="677" y="178" text-anchor="middle" class="conn-label" fill="#f59e0b">WRITES</text>

  <!-- Step 2: StoryFlow → Human (notifies) -->
  <path d="M340,230 L234,230" stroke="#8b5cf6" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arr-purple)"/>
  <circle cx="287" cy="216" r="10" fill="#8b5cf6"/>
  <text x="287" y="220" text-anchor="middle" class="step-num">2</text>
  <text x="287" y="208" text-anchor="middle" class="conn-label" fill="#8b5cf6">NOTIFIES</text>

  <!-- Step 3: Human → StoryFlow (approves/steers) -->
  <path d="M230,280 L340,280" stroke="#10b981" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arr-green)"/>
  <circle cx="285" cy="266" r="10" fill="#10b981"/>
  <text x="285" y="270" text-anchor="middle" class="step-num">3</text>
  <text x="285" y="258" text-anchor="middle" class="conn-label" fill="#10b981">APPROVES / STEERS</text>

  <!-- Step 4: StoryFlow → Agent (reads directives) -->
  <path d="M620,270 L730,270" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arr-amber)"/>
  <circle cx="675" cy="256" r="10" fill="#f59e0b"/>
  <text x="675" y="260" text-anchor="middle" class="step-num">4</text>
  <text x="675" y="248" text-anchor="middle" class="conn-label" fill="#f59e0b">READS DIRECTIVES</text>

  <!-- Bottom annotation -->
  <g transform="translate(120, 410)">
    <rect x="0" y="0" width="720" height="48" rx="10" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="360" y="20" text-anchor="middle" style="font-size:11px;font-weight:600;fill:#5b21b6;">The agent's brain IS the project data</text>
    <text x="360" y="36" text-anchor="middle" class="node-sub">Every action is recorded with actor, reasoning, and confidence. Humans see exactly what the AI knows and can correct it in real time.</text>
  </g>
</svg>
